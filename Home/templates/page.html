<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Diary Entry</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .card{
            border:none;
            border-radius:18px;
            box-shadow:0 12px 30px rgba(0,0,0,.08);
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        textarea{
            resize:none;
        }

        h2{
            font-weight:700;
        }

        .btn{
            border-radius:12px;
            padding:10px 25px;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card p-4">

                <h2 class="text-center mb-4">
                    ✍️ Create Diary Entry
                </h2>

                <form method="POST" action="/">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Title
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="title"
                            placeholder="Enter title"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Description
                        </label>

                        <textarea
                            class="form-control"
                            rows="6"
                            name="description"
                            placeholder="Write your thoughts..."
                            required></textarea>
                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">
                                Date
                            </label>

                            <input
                                type="date"
                                class="form-control"
                                name="date"
                                >
                        </div>

                       

                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-3">

                        <button
                            type="reset"
                            class="btn btn-outline-secondary">
                            Reset
                        </button>

                        <button
                            type="submit"
                            class="btn btn-primary">
                            Save Entry
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
