{% extends 'base.html' %}
{% block title %}Login - MyDiary{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-8 col-sm-10">
            <div class="card card-custom p-4 shadow-sm">
                <div class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right text-primary" style="font-size: 3rem;"></i>
                    <h2 class="fw-bold mt-2">Welcome Back</h2>
                    <p class="text-muted">Login to access your private diary</p>
                </div>

                <form method="POST" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="id_username">Username</label>
                        <input
                            type="text"
                            name="username"
                            id="id_username"
                            class="form-control rounded-3"
                            placeholder="Enter your username"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="id_password">Password</label>
                        <input
                            type="password"
                            name="password"
                            id="id_password"
                            class="form-control rounded-3"
                            placeholder="Enter your password"
                            required>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label text-secondary" for="rememberMe">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="text-primary fw-semibold" style="font-size: 0.9rem;">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary-custom w-100 py-2.5 rounded-3 fw-bold">
                        Login
                    </button>
                </form>

                <hr class="my-4 text-muted">

                <p class="text-center mb-0 text-secondary">
                    Don't have an account?
                    <a href="{% url 'register' %}" class="fw-semibold text-primary">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
